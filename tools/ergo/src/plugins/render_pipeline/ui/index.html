<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>Render Pipeline — Pictor Profile Graph</title>
<link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header id="topbar">
  <span class="brand">🔲 Render Pipeline</span>
  <select id="profile-select" title="Profile を切り替え"></select>
  <button id="save-btn" type="button" title="現在の変更を保存 (Ctrl+S)">保存</button>
  <button id="reload-btn" type="button" title="ディスクから再読込 (未保存破棄)">再読込</button>
  <span id="dirty-indicator" class="hidden" title="未保存の変更あり">●</span>
  <span class="spacer"></span>
  <label class="toggle">
    <input type="checkbox" id="timing-overlay-toggle" checked>
    GPU timing オーバーレイ
  </label>
  <span id="ws-status" class="ws-status" title="WS 接続状態">…</span>
  <span id="status-msg" class="status-msg"></span>
</header>

<main id="layout">
  <aside id="attachment-panel">
    <h3>Attachments</h3>
    <div class="panel-hint">
      Profile が宣言する名前付き GPU リソース。 render_passes の
      <code>render_targets</code> / <code>input_textures</code> から参照する。
    </div>
    <button id="att-add-btn" type="button">+ Attachment</button>
    <ol id="attachment-list" class="panel-list"></ol>
  </aside>

  <section id="graph-view">
    <div id="graph" class="graph-canvas"></div>
    <div class="graph-toolbar">
      <button id="pass-add-btn" type="button" title="新規 RenderPass を追加">+ Pass</button>
      <button id="auto-layout-btn" type="button" title="hierarchical 自動レイアウトを再計算">⤺ Layout</button>
      <span class="legend">
        <span class="legend-item swatch-color"></span>color
        <span class="legend-item swatch-depth"></span>depth
        <span class="legend-item swatch-swap"></span>swapchain
      </span>
    </div>
  </section>

  <aside id="inspector-panel">
    <h3 id="inspector-title">Inspector</h3>
    <div id="inspector-body" class="panel-hint">
      ノードをクリックすると pass プロパティをここで編集できます。
    </div>
  </aside>
</main>

<script src="app.js"></script>
</body>
</html>
