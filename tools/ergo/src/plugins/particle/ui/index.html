<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Particle Effect Editor</title>
<style>
  :root {
    --bg:#1a1d21; --panel:#23272d; --line:#343a42;
    --text:#e7eaef; --muted:#8a93a0;
    --accent:#7cc4ff; --ok:#7cd47c; --bad:#ff7d7d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden;
               background:var(--bg); color:var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  #app { display:grid; grid-template-columns: 1fr 360px; height:100vh; }

  /* Preview area */
  #preview { position:relative; background:#101216; overflow:hidden; }
  #preview canvas { display:block; width:100%; height:100%; }
  #toolbar { position:absolute; top:.5rem; left:.5rem; right:.5rem;
             display:flex; gap:.4rem; align-items:center; flex-wrap:wrap;
             pointer-events:none; }
  #toolbar > * { pointer-events:auto; }
  #toolbar button { background:var(--panel); color:var(--text);
                    border:1px solid var(--line); border-radius:4px;
                    padding:.35rem .7rem; font-size:.8rem; cursor:pointer; }
  #toolbar button:hover { background:#2a2e34; }
  #toolbar button.active { color:var(--accent); border-color:var(--accent); }
  #toolbar .stat { color:var(--muted); font-size:.75rem; margin-left:auto;
                   font-family: ui-monospace, monospace; }
  #toolbar .link { color:var(--muted); font-size:.75rem;
                   font-family: ui-monospace, monospace; padding:.2rem .4rem;
                   border:1px solid transparent; border-radius:3px; }
  #toolbar .link.on  { color:var(--ok);  border-color:var(--ok); }
  #toolbar .link.off { color:var(--bad); border-color:var(--bad); }

  /* Sidebar */
  aside { background:var(--panel); border-left:1px solid var(--line);
          overflow-y:auto; padding:.5rem .75rem; }
  aside h2 { font-size:.75rem; text-transform:uppercase; letter-spacing:.08em;
             color:var(--muted); margin:1rem 0 .35rem 0;
             border-bottom:1px solid var(--line); padding-bottom:.25rem; }
  aside h2:first-child { margin-top:.25rem; }
  .row { display:grid; grid-template-columns: 110px 1fr 60px;
         align-items:center; gap:.4rem; padding:.18rem 0; }
  .row .name { font-size:.78rem; color:var(--text); font-family: ui-monospace, monospace; }
  .row .val  { font-size:.74rem; color:var(--accent); text-align:right;
               font-family: ui-monospace, monospace; }
  .row input[type=range] { width:100%; }
  .row input[type=number] { width:100%; background:#1a1d21; color:var(--text);
                            border:1px solid var(--line); border-radius:3px;
                            padding:.18rem .35rem; font-family: ui-monospace, monospace;
                            font-size:.78rem; }
  .row input[type=color] { width:100%; height:1.5rem; background:none;
                           border:1px solid var(--line); padding:0; cursor:pointer; }
  .row select { width:100%; background:#1a1d21; color:var(--text);
                border:1px solid var(--line); border-radius:3px; padding:.18rem .35rem;
                font-size:.78rem; }
  .row.full { grid-template-columns: 1fr; }
  .row.full > .name { padding-bottom:.2rem; }

  /* IO panel */
  #io { margin-top:1rem; padding-top:.6rem; border-top:1px solid var(--line); }
  #io textarea { width:100%; height:100px; background:#101216;
                 color:var(--text); border:1px solid var(--line); border-radius:3px;
                 padding:.4rem; font-family: ui-monospace, monospace; font-size:.72rem;
                 resize:vertical; }
  #io .btnrow { display:flex; gap:.4rem; margin-top:.4rem; flex-wrap:wrap; }
  #io button { background:#1a1d21; color:var(--text); border:1px solid var(--line);
               border-radius:3px; padding:.3rem .6rem; cursor:pointer; font-size:.75rem; }
  #io button:hover { background:#262a30; }
  #io .msg { font-size:.72rem; color:var(--muted); margin-top:.3rem; min-height:1.1em; }
  #io .msg.ok { color:var(--ok); }
  #io .msg.bad { color:var(--bad); }

  /* Presets */
  #presets { display:flex; gap:.3rem; flex-wrap:wrap; margin-top:.4rem; }
  #presets button { background:#1a1d21; color:var(--text); border:1px solid var(--line);
                    border-radius:3px; padding:.25rem .5rem; cursor:pointer; font-size:.72rem; }
  #presets button:hover { color:var(--accent); border-color:var(--accent); }

  /* SVG panel */
  #svgPanel .btnrow { display:flex; gap:.4rem; margin-bottom:.35rem; }
  #svgPanel button, #svgPanel .svgfile-label {
    background:#1a1d21; color:var(--text); border:1px solid var(--line);
    border-radius:3px; padding:.3rem .6rem; cursor:pointer; font-size:.75rem;
  }
  #svgPanel button:hover, #svgPanel .svgfile-label:hover { background:#262a30; }
  #svgPanel textarea {
    width:100%; height:100px; background:#101216;
    color:var(--text); border:1px solid var(--line); border-radius:3px;
    padding:.4rem; font-family: ui-monospace, monospace; font-size:.7rem;
    resize:vertical;
  }
  #svgPanel .msg { font-size:.72rem; color:var(--muted); margin-top:.3rem; min-height:1.1em; }
  #svgPanel .msg.ok  { color:var(--ok); }
  #svgPanel .msg.bad { color:var(--bad); }
</style>
</head>
<body>
<div id="app">
  <section id="preview">
    <canvas id="cv"></canvas>
    <div id="toolbar">
      <button id="btnPlay" class="active">Pause</button>
      <button id="btnReset">Reset</button>
      <button id="btnBurst">Burst</button>
      <span class="link off" id="link" title="WebSocket sync status">offline</span>
      <span class="stat" id="stat">0 alive · 0 fps</span>
    </div>
  </section>

  <aside>
    <h2>Emission</h2>
    <div id="emission"></div>

    <h2>Initial</h2>
    <div id="initial"></div>

    <h2>Over Life</h2>
    <div id="overlife"></div>

    <h2>SVG Source</h2>
    <div id="svgPanel">
      <div class="btnrow">
        <label id="svgFileLabel" class="svgfile-label">
          <input type="file" id="svgFile" accept=".svg,image/svg+xml" hidden>
          Load file…
        </label>
        <button id="svgClear" type="button">Clear</button>
      </div>
      <textarea id="svgSource" spellcheck="false"
                placeholder="Paste <svg>...</svg> or a path `d` attribute here."></textarea>
      <div class="msg" id="svgMsg"></div>
    </div>

    <h2>Forces</h2>
    <div id="forces"></div>

    <h2>Render</h2>
    <div id="render"></div>

    <h2>Presets</h2>
    <div id="presets"></div>

    <div id="io">
      <h2 style="margin-top:0;border:none;padding:0">Export / Import</h2>
      <textarea id="json" spellcheck="false"></textarea>
      <div class="btnrow">
        <button id="btnExport">Export →</button>
        <button id="btnImport">← Import</button>
        <button id="btnCopy">Copy</button>
        <button id="btnDownload">Download</button>
      </div>
      <div class="msg" id="ioMsg"></div>
    </div>
  </aside>
</div>

<script>
"use strict";

// ---------------------------------------------------------------------------
// Default config
// ---------------------------------------------------------------------------
const DEFAULTS = {
  version: 1,
  name: "untitled",
  emission: { rate: 60, maxAlive: 400 },
  initial: {
    positionShape: "disc",        // "disc" | "svgStroke" | "svgFill"
    svgSource: "",                // raw <svg>...</svg> or path d attribute
    svgScale: 1,                  // uniform scale after centering on bbox
    positionRadius: 4,
    velocityAngleDeg: 270,        // 0 = +X, 90 = +Y (down on canvas), 270 = -Y (up)
    velocityAngleSpreadDeg: 60,
    speedMin: 80,
    speedMax: 180,
    lifetimeMin: 0.7,
    lifetimeMax: 1.4,
    size: 8,
    color: [1, 0.75, 0.25, 1]
  },
  overLife: {
    sizeStart: 1.0,
    sizeEnd: 0.0,
    colorStart: [1, 0.75, 0.25, 1],
    colorEnd:   [0.7, 0.1, 0.0, 0],
    velocityDamping: 0.6           // multiplied per second (1=no damping, 0=instant stop)
  },
  forces: { gravity: [0, 120] },
  render: { blend: "additive", shape: "circle" }
};

// Active config (deep copy)
let cfg = JSON.parse(JSON.stringify(DEFAULTS));

// ---------------------------------------------------------------------------
// UI builder — schema-driven
// ---------------------------------------------------------------------------
const SCHEMA = {
  emission: [
    {key:"rate",      label:"Rate",      kind:"num", min:0,  max:500, step:1},
    {key:"maxAlive",  label:"Max Alive", kind:"num", min:1,  max:5000, step:1},
  ],
  initial: [
    {key:"positionShape",           label:"Pos Shape",   kind:"select", options:["disc","svgStroke","svgFill"]},
    {key:"positionRadius",          label:"Pos Radius",  kind:"num", min:0,   max:200,  step:1},
    {key:"svgScale",                label:"SVG Scale",   kind:"num", min:0.01,max:20,   step:0.01},
    {key:"velocityAngleDeg",        label:"Vel Angle",   kind:"num", min:0,   max:360,  step:1, unit:"°"},
    {key:"velocityAngleSpreadDeg",  label:"Vel Spread",  kind:"num", min:0,   max:360,  step:1, unit:"°"},
    {key:"speedMin",                label:"Speed Min",   kind:"num", min:0,   max:1000, step:1},
    {key:"speedMax",                label:"Speed Max",   kind:"num", min:0,   max:1000, step:1},
    {key:"lifetimeMin",             label:"Life Min",    kind:"num", min:0.05,max:10,   step:0.05, unit:"s"},
    {key:"lifetimeMax",             label:"Life Max",    kind:"num", min:0.05,max:10,   step:0.05, unit:"s"},
    {key:"size",                    label:"Size",        kind:"num", min:1,   max:128,  step:1, unit:"px"},
    {key:"color",                   label:"Color",       kind:"color"},
  ],
  overLife: [
    {key:"sizeStart",        label:"Size Start",  kind:"num", min:0, max:5,  step:0.05},
    {key:"sizeEnd",          label:"Size End",    kind:"num", min:0, max:5,  step:0.05},
    {key:"colorStart",       label:"Color Start", kind:"color"},
    {key:"colorEnd",         label:"Color End",   kind:"color"},
    {key:"velocityDamping",  label:"Vel Damping", kind:"num", min:0.01, max:1, step:0.01},
  ],
  forces: [
    {key:"gravity", label:"Gravity", kind:"vec2"},
  ],
  render: [
    {key:"blend", label:"Blend",  kind:"select", options:["additive","alpha"]},
    {key:"shape", label:"Shape",  kind:"select", options:["circle","square"]},
  ],
};

function buildSection(group, container) {
  for (const f of SCHEMA[group]) {
    const row = document.createElement("div");
    row.className = "row" + (f.kind === "color" || f.kind === "vec2" ? " full" : "");

    const name = document.createElement("div");
    name.className = "name";
    name.textContent = f.label + (f.unit ? " ("+f.unit+")" : "");
    row.appendChild(name);

    const ctrl = document.createElement("div");
    row.appendChild(ctrl);

    const vlabel = (f.kind === "color" || f.kind === "vec2" || f.kind === "select")
                    ? null
                    : document.createElement("div");
    if (vlabel) { vlabel.className = "val"; row.appendChild(vlabel); }

    const cur = cfg[group][f.key];

    if (f.kind === "num") {
      const r = document.createElement("input");
      r.type = "range"; r.min = f.min; r.max = f.max; r.step = f.step;
      r.value = cur;
      vlabel.textContent = formatNum(cur, f.step);
      r.oninput = () => {
        const n = Number(r.value);
        cfg[group][f.key] = n;
        vlabel.textContent = formatNum(n, f.step);
      };
      ctrl.appendChild(r);
    } else if (f.kind === "color") {
      const c = document.createElement("input");
      c.type = "color";
      c.value = rgbaToHex(cur);
      c.oninput = () => {
        const rgb = hexToRgb(c.value);
        cfg[group][f.key] = [rgb[0], rgb[1], rgb[2], cur[3] != null ? cur[3] : 1];
      };
      ctrl.appendChild(c);
      // Add an alpha slider next to it
      const a = document.createElement("input");
      a.type = "range"; a.min = 0; a.max = 1; a.step = 0.01;
      a.value = cur[3] != null ? cur[3] : 1;
      a.style.marginTop = "3px";
      a.oninput = () => {
        cfg[group][f.key] = [cur[0], cur[1], cur[2], Number(a.value)];
      };
      ctrl.appendChild(a);
    } else if (f.kind === "vec2") {
      const wrap = document.createElement("div");
      wrap.style.display = "grid";
      wrap.style.gridTemplateColumns = "1fr 1fr";
      wrap.style.gap = "4px";
      for (let i = 0; i < 2; ++i) {
        const n = document.createElement("input");
        n.type = "number"; n.value = cur[i]; n.step = 1;
        n.onchange = () => { cfg[group][f.key][i] = Number(n.value); };
        wrap.appendChild(n);
      }
      ctrl.appendChild(wrap);
    } else if (f.kind === "select") {
      const s = document.createElement("select");
      for (const opt of f.options) {
        const o = document.createElement("option");
        o.value = opt; o.textContent = opt;
        if (opt === cur) o.selected = true;
        s.appendChild(o);
      }
      s.onchange = () => { cfg[group][f.key] = s.value; };
      ctrl.appendChild(s);
    }

    container.appendChild(row);
  }
}

function rebuildUI() {
  for (const g of Object.keys(SCHEMA)) {
    const c = document.getElementById(g);
    c.innerHTML = "";
    buildSection(g, c);
  }
  // Keep the SVG panel textarea in sync with cfg. Handlers may be unattached
  // on first call so we no-op out if they don't exist yet.
  const svgEl = document.getElementById("svgSource");
  if (svgEl) svgEl.value = cfg.initial.svgSource || "";
}

function formatNum(n, step) {
  if (step >= 1) return String(Math.round(n));
  const places = Math.max(0, -Math.floor(Math.log10(step)));
  return Number(n).toFixed(places);
}

function rgbaToHex(c) {
  const f = x => Math.max(0, Math.min(255, Math.round(x*255))).toString(16).padStart(2,"0");
  return "#" + f(c[0]) + f(c[1]) + f(c[2]);
}
function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}

// ---------------------------------------------------------------------------
// Particle simulation
// ---------------------------------------------------------------------------
const cv  = document.getElementById("cv");
const ctx = cv.getContext("2d");
let dpr = window.devicePixelRatio || 1;

function resizeCanvas() {
  dpr = window.devicePixelRatio || 1;
  cv.width  = cv.clientWidth  * dpr;
  cv.height = cv.clientHeight * dpr;
}
window.addEventListener("resize", resizeCanvas);

const particles = [];
let emitAccum = 0;
let playing = true;
let lastFrame = performance.now();
let fps = 0;
let fpsAccum = 0, fpsCount = 0;

function rand(a, b) { return a + Math.random() * (b - a); }
function lerp(a, b, t) { return a + (b - a) * t; }
function lerpColor(a, b, t) {
  return [lerp(a[0],b[0],t), lerp(a[1],b[1],t), lerp(a[2],b[2],t), lerp(a[3],b[3],t)];
}
function colorToRgba(c) {
  const r = Math.round(Math.max(0, Math.min(1, c[0]))*255);
  const g = Math.round(Math.max(0, Math.min(1, c[1]))*255);
  const b = Math.round(Math.max(0, Math.min(1, c[2]))*255);
  return "rgba("+r+","+g+","+b+","+Math.max(0, Math.min(1, c[3]))+")";
}

// ---------------------------------------------------------------------------
// SVG emitter support
// ---------------------------------------------------------------------------
// Keeps a parsed SVG document offscreen so we can use SVGGeometryElement's
// getTotalLength / getPointAtLength / isPointInFill APIs. The host element is
// hidden via CSS (visibility:hidden, position:absolute, 0-sized) so layout is
// not affected. Parsing is lazy and only redone when svgSource changes.
const svgHost = document.createElement("div");
svgHost.style.cssText = "position:absolute;width:0;height:0;overflow:hidden;visibility:hidden;pointer-events:none;";
document.body.appendChild(svgHost);

const svgState = {
  source: null,          // last-parsed svgSource string
  shapes: [],            // SVGGeometryElement[] extracted from the document
  bbox:   null,          // merged bbox {x, y, width, height} in SVG coords
  totalLen: 0,           // sum of shape.getTotalLength() for stroke sampling
  lenPrefix: [],         // cumulative lengths aligned with `shapes`
  error:  null,          // user-visible parse failure
};

function rebuildSvg() {
  if (svgState.source === cfg.initial.svgSource) return;
  svgState.source = cfg.initial.svgSource;
  svgState.shapes = [];
  svgState.bbox   = null;
  svgState.totalLen = 0;
  svgState.lenPrefix = [];
  svgState.error = null;
  svgHost.innerHTML = "";

  const raw = (cfg.initial.svgSource || "").trim();
  if (!raw) return;

  // Accept either full <svg>...</svg> markup OR just a path `d` attribute.
  let markup;
  if (/^<svg[\s>]/i.test(raw)) {
    markup = raw;
  } else if (/^<path[\s>]/i.test(raw)) {
    markup = `<svg xmlns="http://www.w3.org/2000/svg">${raw}</svg>`;
  } else {
    // Treat as bare `d` data.
    markup = `<svg xmlns="http://www.w3.org/2000/svg"><path d="${raw.replace(/"/g,"&quot;")}"/></svg>`;
  }

  let root;
  try {
    const parsed = new DOMParser().parseFromString(markup, "image/svg+xml");
    const err = parsed.querySelector("parsererror");
    if (err) { svgState.error = "invalid SVG"; return; }
    root = parsed.documentElement;
  } catch (e) {
    svgState.error = String(e);
    return;
  }

  svgHost.appendChild(root);
  const nodes = root.querySelectorAll("path,polygon,polyline,rect,circle,ellipse,line");
  for (const n of nodes) {
    if (typeof n.getTotalLength !== "function") continue;
    try {
      const len = n.getTotalLength();
      const bb  = n.getBBox();
      svgState.shapes.push(n);
      svgState.lenPrefix.push(svgState.totalLen + len);
      svgState.totalLen += len;
      if (!svgState.bbox) {
        svgState.bbox = { x: bb.x, y: bb.y, width: bb.width, height: bb.height };
      } else {
        const x0 = Math.min(svgState.bbox.x, bb.x);
        const y0 = Math.min(svgState.bbox.y, bb.y);
        const x1 = Math.max(svgState.bbox.x + svgState.bbox.width,  bb.x + bb.width);
        const y1 = Math.max(svgState.bbox.y + svgState.bbox.height, bb.y + bb.height);
        svgState.bbox = { x: x0, y: y0, width: x1 - x0, height: y1 - y0 };
      }
    } catch {}
  }

  if (svgState.shapes.length === 0) {
    svgState.error = "no geometry elements found";
  }
}

// Map an SVG-coordinate point onto the emitter's local frame (centered on
// bbox, Y retained — SVG's Y-down matches the canvas convention here).
function svgToEmitter(sx, sy) {
  if (!svgState.bbox) return [0, 0];
  const cx = svgState.bbox.x + svgState.bbox.width / 2;
  const cy = svgState.bbox.y + svgState.bbox.height / 2;
  const s  = cfg.initial.svgScale || 1;
  return [(sx - cx) * s, (sy - cy) * s];
}

function sampleSvgStroke() {
  if (svgState.totalLen <= 0 || svgState.shapes.length === 0) return null;
  const t = Math.random() * svgState.totalLen;
  // Locate the shape owning `t` via the prefix sums.
  let lo = 0, hi = svgState.lenPrefix.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (svgState.lenPrefix[mid] < t) lo = mid + 1; else hi = mid;
  }
  const shape = svgState.shapes[lo];
  const prev  = lo === 0 ? 0 : svgState.lenPrefix[lo - 1];
  try {
    const p = shape.getPointAtLength(t - prev);
    return svgToEmitter(p.x, p.y);
  } catch {
    return null;
  }
}

function sampleSvgFill() {
  if (!svgState.bbox || svgState.shapes.length === 0) return null;
  const { x, y, width: w, height: h } = svgState.bbox;
  for (let tries = 0; tries < 32; ++tries) {
    const sx = x + Math.random() * w;
    const sy = y + Math.random() * h;
    const pt = new DOMPoint(sx, sy);
    for (const s of svgState.shapes) {
      if (typeof s.isPointInFill !== "function") continue;
      try {
        if (s.isPointInFill(pt)) return svgToEmitter(sx, sy);
      } catch {}
    }
  }
  return null;
}

function sampleSpawnPosition() {
  if (cfg.initial.positionShape === "svgStroke") {
    rebuildSvg();
    const p = sampleSvgStroke();
    if (p) return p;
    // Fallback to disc if SVG is missing / invalid.
  } else if (cfg.initial.positionShape === "svgFill") {
    rebuildSvg();
    const p = sampleSvgFill();
    if (p) return p;
  }
  // Default: uniform inside circle of radius positionRadius.
  const a = Math.random() * Math.PI * 2;
  const r = Math.sqrt(Math.random()) * cfg.initial.positionRadius;
  return [Math.cos(a) * r, Math.sin(a) * r];
}

function emit() {
  if (particles.length >= cfg.emission.maxAlive) return;
  const p = {};
  const [sx, sy] = sampleSpawnPosition();
  p.x = sx;
  p.y = sy;
  // velocity
  const ang = (cfg.initial.velocityAngleDeg + rand(-1, 1) * cfg.initial.velocityAngleSpreadDeg/2) * Math.PI / 180;
  const speed = rand(cfg.initial.speedMin, cfg.initial.speedMax);
  p.vx = Math.cos(ang) * speed;
  p.vy = Math.sin(ang) * speed;
  // life
  p.lifetime = rand(cfg.initial.lifetimeMin, cfg.initial.lifetimeMax);
  p.age = 0;
  p.initSize = cfg.initial.size;
  p.initColor = cfg.initial.color.slice();
  particles.push(p);
}

function burst(n) {
  n = n || 50;
  for (let i = 0; i < n; ++i) emit();
}

function step(dt) {
  if (playing) {
    emitAccum += cfg.emission.rate * dt;
    while (emitAccum >= 1) { emit(); emitAccum -= 1; }
  }

  // damping factor = velocityDamping^dt (per second)
  const damp = Math.pow(cfg.overLife.velocityDamping, dt);
  const gx = cfg.forces.gravity[0], gy = cfg.forces.gravity[1];

  for (let i = particles.length - 1; i >= 0; --i) {
    const p = particles[i];
    p.age += dt;
    if (p.age >= p.lifetime) { particles.splice(i, 1); continue; }
    p.vx = p.vx * damp + gx * dt;
    p.vy = p.vy * damp + gy * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
}

function draw() {
  const W = cv.width, H = cv.height;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = "#101216";
  ctx.fillRect(0, 0, W, H);

  // Crosshair (origin marker)
  ctx.strokeStyle = "#252a30";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H/2); ctx.lineTo(W, H/2);
  ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H);
  ctx.stroke();

  // Origin in canvas pixels
  const ox = W/2, oy = H/2;

  // SVG emitter outline guide (only when an SVG mode is active and valid)
  if ((cfg.initial.positionShape === "svgStroke" || cfg.initial.positionShape === "svgFill")
      && svgState.shapes.length > 0 && svgState.bbox) {
    const cx = svgState.bbox.x + svgState.bbox.width / 2;
    const cy = svgState.bbox.y + svgState.bbox.height / 2;
    const s  = (cfg.initial.svgScale || 1) * dpr;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(s, s);
    ctx.translate(-cx, -cy);
    ctx.strokeStyle = "rgba(124,196,255,0.35)";
    ctx.fillStyle   = "rgba(124,196,255,0.08)";
    ctx.lineWidth   = 1 / Math.max(0.0001, s);
    for (const el of svgState.shapes) {
      const d = el.getAttribute("d");
      if (d) {
        const path = new Path2D(d);
        if (cfg.initial.positionShape === "svgFill") ctx.fill(path);
        ctx.stroke(path);
      } else {
        // Non-path geometry (rect/circle/etc) — approximate via sampled polyline
        // using getTotalLength/getPointAtLength.
        const len = el.getTotalLength();
        if (len <= 0) continue;
        const steps = Math.max(24, Math.min(256, Math.ceil(len / 4)));
        ctx.beginPath();
        for (let i = 0; i <= steps; ++i) {
          const p = el.getPointAtLength((i / steps) * len);
          if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
        }
        if (cfg.initial.positionShape === "svgFill") ctx.fill();
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // Blend mode
  ctx.globalCompositeOperation = (cfg.render.blend === "additive") ? "lighter" : "source-over";

  for (const p of particles) {
    const t = Math.min(1, Math.max(0, p.age / p.lifetime));
    const sizeMul = lerp(cfg.overLife.sizeStart, cfg.overLife.sizeEnd, t);
    const size = p.initSize * sizeMul * dpr;
    if (size <= 0.5) continue;
    const col = lerpColor(cfg.overLife.colorStart, cfg.overLife.colorEnd, t);

    ctx.fillStyle = colorToRgba(col);
    if (cfg.render.shape === "square") {
      ctx.fillRect(ox + p.x*dpr - size/2, oy + p.y*dpr - size/2, size, size);
    } else {
      ctx.beginPath();
      ctx.arc(ox + p.x*dpr, oy + p.y*dpr, size/2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.globalCompositeOperation = "source-over";
}

function loop(now) {
  const dtRaw = (now - lastFrame) / 1000;
  const dt = Math.min(0.05, dtRaw);
  lastFrame = now;

  if (playing) step(dt);
  draw();

  fpsAccum += dtRaw; fpsCount++;
  if (fpsAccum >= 0.5) { fps = Math.round(fpsCount / fpsAccum); fpsAccum = 0; fpsCount = 0; }
  document.getElementById("stat").textContent =
    particles.length + " alive · " + fps + " fps";

  requestAnimationFrame(loop);
}

// ---------------------------------------------------------------------------
// Toolbar + IO
// ---------------------------------------------------------------------------
document.getElementById("btnPlay").onclick = (e) => {
  playing = !playing;
  e.target.textContent = playing ? "Pause" : "Play";
  e.target.classList.toggle("active", playing);
};
document.getElementById("btnReset").onclick = () => {
  particles.length = 0;
  emitAccum = 0;
};
document.getElementById("btnBurst").onclick = () => burst(50);

const ioBox = document.getElementById("json");
const ioMsg = document.getElementById("ioMsg");
function showMsg(text, kind) {
  ioMsg.textContent = text;
  ioMsg.className = "msg " + (kind || "");
  if (text) setTimeout(() => { if (ioMsg.textContent === text) { ioMsg.textContent = ""; ioMsg.className = "msg"; } }, 2500);
}

document.getElementById("btnExport").onclick = () => {
  ioBox.value = JSON.stringify(cfg, null, 2);
  showMsg("exported");
};
document.getElementById("btnImport").onclick = () => {
  try {
    const next = JSON.parse(ioBox.value);
    cfg = mergeWithDefaults(next);
    rebuildUI();
    showMsg("imported", "ok");
  } catch (e) {
    showMsg("invalid JSON", "bad");
  }
};
document.getElementById("btnCopy").onclick = async () => {
  try {
    await navigator.clipboard.writeText(JSON.stringify(cfg, null, 2));
    showMsg("copied", "ok");
  } catch {
    showMsg("clipboard blocked", "bad");
  }
};
document.getElementById("btnDownload").onclick = () => {
  const blob = new Blob([JSON.stringify(cfg, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = (cfg.name || "particle") + ".json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
};

// ---- SVG source panel ----
const svgTxt = document.getElementById("svgSource");
const svgMsg = document.getElementById("svgMsg");
function showSvgMsg(text, kind) {
  svgMsg.textContent = text || "";
  svgMsg.className = "msg" + (kind ? " " + kind : "");
}
function refreshSvgState() {
  svgState.source = null;   // force rebuild on next emit / draw
  rebuildSvg();
  if (svgState.error) {
    showSvgMsg("SVG: " + svgState.error, "bad");
  } else if (svgState.shapes.length > 0) {
    showSvgMsg(`SVG: ${svgState.shapes.length} shape(s), bbox `
               + `${svgState.bbox.width.toFixed(1)} x ${svgState.bbox.height.toFixed(1)}`, "ok");
  } else {
    showSvgMsg("");
  }
}
svgTxt.addEventListener("input", () => {
  cfg.initial.svgSource = svgTxt.value;
  refreshSvgState();
});
document.getElementById("svgFile").addEventListener("change", async (ev) => {
  const f = ev.target.files && ev.target.files[0];
  if (!f) return;
  try {
    const text = await f.text();
    svgTxt.value = text;
    cfg.initial.svgSource = text;
    refreshSvgState();
    // Switch to an SVG mode if currently on disc (so the new source takes effect).
    if (cfg.initial.positionShape === "disc") {
      cfg.initial.positionShape = "svgFill";
      rebuildUI();
    }
  } catch (e) {
    showSvgMsg("file read failed: " + e, "bad");
  } finally {
    ev.target.value = "";   // allow re-selecting the same file next time
  }
});
document.getElementById("svgClear").onclick = () => {
  svgTxt.value = "";
  cfg.initial.svgSource = "";
  refreshSvgState();
};

function mergeWithDefaults(input) {
  const out = JSON.parse(JSON.stringify(DEFAULTS));
  if (!input || typeof input !== "object") return out;
  for (const k of Object.keys(out)) {
    if (input[k] != null && typeof input[k] === "object" && !Array.isArray(input[k])) {
      Object.assign(out[k], input[k]);
    } else if (input[k] != null) {
      out[k] = input[k];
    }
  }
  return out;
}

};

function buildPresets() {
  const wrap = document.getElementById("presets");
  wrap.innerHTML = "";
  for (const name of Object.keys(PRESETS)) {
    const b = document.createElement("button");
    b.textContent = name;
    b.onclick = () => {
      cfg = mergeWithDefaults(PRESETS[name]);
      cfg.name = name;
      particles.length = 0;
      rebuildUI();
      if (name === "explosion") burst(150);
      showMsg("loaded " + name, "ok");
    };
    wrap.appendChild(b);
  }
}

// ---------------------------------------------------------------------------
// WebSocket sync — connects to the editor server (only when served via http).
// On any UI change in the sidebar we send `{op:"set", config: cfg}`. On
// `state` messages from the server we replace `cfg` and rebuild the UI.
// `applyingState` suppresses re-broadcast while we apply an inbound state.
// ---------------------------------------------------------------------------
let ws = null;
let applyingState = false;
let pendingSendTimer = null;
const linkEl = document.getElementById("link");

function setLink(state, text) {
  linkEl.className = "link " + state;
  linkEl.textContent = text;
}

function maybeSendNow() {
  if (applyingState) return;
  if (!ws || ws.readyState !== 1) return;
  if (pendingSendTimer) { clearTimeout(pendingSendTimer); pendingSendTimer = null; }
  ws.send(JSON.stringify({op:"set", config: cfg}));
}

function scheduleSend() {
  if (applyingState) return;
  if (!ws || ws.readyState !== 1) return;
  if (pendingSendTimer) clearTimeout(pendingSendTimer);
  pendingSendTimer = setTimeout(() => {
    pendingSendTimer = null;
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({op:"set", config: cfg}));
    }
  }, 33); // ~30 Hz throttle
}

// Send on any user-initiated input/change in the sidebar.
document.querySelector("aside").addEventListener("input",  scheduleSend);
document.querySelector("aside").addEventListener("change", scheduleSend);

function connectWS() {
  try {
    ws = new WebSocket("ws://" + location.host + "/particle/ws");
  } catch {
    setLink("off", "offline");
    return;
  }
  setLink("off", "connecting...");
  ws.onopen = () => setLink("on", "live");
  ws.onmessage = (ev) => {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.op !== "state" || !msg.config) return;
    const next = JSON.stringify(msg.config);
    const cur  = JSON.stringify(cfg);
    if (cur !== next) {
      applyingState = true;
      cfg = msg.config;
      rebuildUI();
      ioBox.value = JSON.stringify(cfg, null, 2);
      applyingState = false;
    }
    setLink("on", "live · " + (msg.clients || 1) + " client" + ((msg.clients||1)===1?"":"s"));
  };
  ws.onclose = () => {
    setLink("off", "offline — retry");
    setTimeout(connectWS, 1500);
  };
  ws.onerror = () => { /* close handler will retry */ };
}

// Hook preset/import to push to server too.
const _origImport  = document.getElementById("btnImport").onclick;
document.getElementById("btnImport").onclick = () => { _origImport(); maybeSendNow(); };
document.getElementById("presets").addEventListener("click", () => setTimeout(maybeSendNow, 0));

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
resizeCanvas();
rebuildUI();
buildPresets();
ioBox.value = JSON.stringify(cfg, null, 2);
requestAnimationFrame(loop);

if (location.protocol === "http:" || location.protocol === "https:") {
  connectWS();
}
