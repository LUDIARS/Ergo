<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>wood_01 — 木 (planks)</title>
  <defs>
    <linearGradient id="wood01-plank" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#b48955"/>
      <stop offset="0.5" stop-color="#9c7340"/>
      <stop offset="1"   stop-color="#815d30"/>
    </linearGradient>
    <pattern id="wood01-grain" x="0" y="0" width="64" height="128" patternUnits="userSpaceOnUse">
      <rect width="64" height="128" fill="transparent"/>
      <path d="M0 20 q 16 -6 32 0 t 32 0" stroke="#6a4a24" stroke-width="0.6" fill="none" opacity="0.6"/>
      <path d="M0 44 q 16 -4 32 0 t 32 0" stroke="#6a4a24" stroke-width="0.5" fill="none" opacity="0.5"/>
      <path d="M0 74 q 16 -8 32 0 t 32 0" stroke="#6a4a24" stroke-width="0.7" fill="none" opacity="0.55"/>
      <path d="M0 100 q 16 -5 32 0 t 32 0" stroke="#6a4a24" stroke-width="0.5" fill="none" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="url(#wood01-plank)"/>
  <rect width="512" height="512" fill="url(#wood01-grain)"/>
  <!-- plank separators (every 128px) -->
  <g stroke="#4e3618" stroke-width="2.2" opacity="0.85">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>
  <!-- staggered plank joints to break tiling -->
  <g stroke="#4e3618" stroke-width="1.8" opacity="0.75">
    <line x1="170" y1="0"   x2="170" y2="128"/>
    <line x1="330" y1="0"   x2="330" y2="128"/>
    <line x1="80"  y1="128" x2="80"  y2="256"/>
    <line x1="260" y1="128" x2="260" y2="256"/>
    <line x1="430" y1="128" x2="430" y2="256"/>
    <line x1="150" y1="256" x2="150" y2="384"/>
    <line x1="360" y1="256" x2="360" y2="384"/>
    <line x1="90"  y1="384" x2="90"  y2="512"/>
    <line x1="300" y1="384" x2="300" y2="512"/>
    <line x1="450" y1="384" x2="450" y2="512"/>
  </g>
  <!-- knots -->
  <g fill="#4e3618" opacity="0.8">
    <ellipse cx="110" cy="70"  rx="6" ry="4"/>
    <ellipse cx="380" cy="190" rx="7" ry="5"/>
    <ellipse cx="230" cy="320" rx="5" ry="4"/>
    <ellipse cx="420" cy="450" rx="6" ry="5"/>
  </g>
  <!-- nails -->
  <g fill="#3a3a3a">
    <circle cx="20"  cy="20"  r="2"/>
    <circle cx="492" cy="20"  r="2"/>
    <circle cx="20"  cy="132" r="2"/>
    <circle cx="492" cy="132" r="2"/>
    <circle cx="20"  cy="260" r="2"/>
    <circle cx="492" cy="260" r="2"/>
    <circle cx="20"  cy="388" r="2"/>
    <circle cx="492" cy="388" r="2"/>
    <circle cx="20"  cy="492" r="2"/>
    <circle cx="492" cy="492" r="2"/>
  </g>
</svg>
