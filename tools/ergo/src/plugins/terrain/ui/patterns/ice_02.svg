<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>ice_02 — 氷 (frosted shards)</title>
  <defs>
    <linearGradient id="ice02-base" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c9e5ff"/>
      <stop offset="1" stop-color="#6f9ec3"/>
    </linearGradient>
    <radialGradient id="ice02-gloss" cx="70%" cy="30%" r="75%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#ice02-base)"/>
  <rect width="512" height="512" fill="url(#ice02-gloss)"/>
  <!-- frosted shards (angular polygons) -->
  <g fill="#ffffff" opacity="0.22" stroke="#7dabd0" stroke-width="0.8">
    <polygon points="40,30 120,60 100,130 30,110"/>
    <polygon points="200,20 290,45 260,120 190,100"/>
    <polygon points="340,50 440,30 460,110 360,130"/>
    <polygon points="60,180 160,150 180,240 80,260"/>
    <polygon points="220,170 320,200 310,290 210,270"/>
    <polygon points="360,200 470,180 460,280 370,300"/>
    <polygon points="40,320 130,290 150,380 50,400"/>
    <polygon points="200,340 290,320 310,420 220,430"/>
    <polygon points="360,330 450,360 440,450 350,440"/>
  </g>
  <!-- fine cracks -->
  <g stroke="#3e6b8f" stroke-width="0.9" fill="none" opacity="0.5" stroke-linecap="round">
    <path d="M40 30 L120 60"/>
    <path d="M120 60 L100 130"/>
    <path d="M200 20 L290 45"/>
    <path d="M260 120 L220 170"/>
    <path d="M440 30 L460 110"/>
    <path d="M60 180 L160 150"/>
    <path d="M320 200 L360 200"/>
    <path d="M40 320 L130 290"/>
    <path d="M290 320 L360 330"/>
    <path d="M440 450 L460 280"/>
  </g>
  <!-- snowflakes small -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.7" fill="none">
    <g transform="translate(150 220)">
      <line x1="-7" y1="0" x2="7" y2="0"/>
      <line x1="0" y1="-7" x2="0" y2="7"/>
    </g>
    <g transform="translate(380 150)">
      <line x1="-7" y1="0" x2="7" y2="0"/>
      <line x1="0" y1="-7" x2="0" y2="7"/>
    </g>
    <g transform="translate(260 400)">
      <line x1="-6" y1="0" x2="6" y2="0"/>
      <line x1="0" y1="-6" x2="0" y2="6"/>
    </g>
    <g transform="translate(80 440)">
      <line x1="-7" y1="0" x2="7" y2="0"/>
      <line x1="0" y1="-7" x2="0" y2="7"/>
    </g>
  </g>
  <g fill="#ffffff" opacity="0.4">
    <circle cx="100" cy="90"  r="2"/>
    <circle cx="260" cy="80"  r="1.6"/>
    <circle cx="400" cy="70"  r="2.2"/>
    <circle cx="200" cy="230" r="1.8"/>
    <circle cx="360" cy="250" r="2"/>
    <circle cx="120" cy="360" r="2.2"/>
    <circle cx="280" cy="370" r="1.6"/>
    <circle cx="420" cy="400" r="2"/>
  </g>
</svg>
