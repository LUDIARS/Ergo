<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>cobble_01 — 石畳 (regular brick)</title>
  <rect width="512" height="512" fill="#3f3f44"/>
  <!-- Two alternating rows to get brick-style offset. 64x64 base cell. -->
  <g stroke="#1f1f22" stroke-width="3" stroke-linejoin="round">
    <!-- row 1 (y=0..64) -->
    <rect x="0"   y="0"   width="64"  height="64" fill="#7c7c85"/>
    <rect x="64"  y="0"   width="64"  height="64" fill="#6f6f78"/>
    <rect x="128" y="0"   width="64"  height="64" fill="#85858f"/>
    <rect x="192" y="0"   width="64"  height="64" fill="#6a6a73"/>
    <rect x="256" y="0"   width="64"  height="64" fill="#7c7c85"/>
    <rect x="320" y="0"   width="64"  height="64" fill="#6f6f78"/>
    <rect x="384" y="0"   width="64"  height="64" fill="#80808a"/>
    <rect x="448" y="0"   width="64"  height="64" fill="#70707a"/>
    <!-- row 2 (y=64..128) offset by -32 -->
    <rect x="-32" y="64"  width="64"  height="64" fill="#75757e"/>
    <rect x="32"  y="64"  width="64"  height="64" fill="#82828c"/>
    <rect x="96"  y="64"  width="64"  height="64" fill="#6c6c75"/>
    <rect x="160" y="64"  width="64"  height="64" fill="#7e7e88"/>
    <rect x="224" y="64"  width="64"  height="64" fill="#72727b"/>
    <rect x="288" y="64"  width="64"  height="64" fill="#81818b"/>
    <rect x="352" y="64"  width="64"  height="64" fill="#6d6d76"/>
    <rect x="416" y="64"  width="64"  height="64" fill="#7b7b84"/>
    <rect x="480" y="64"  width="64"  height="64" fill="#757580"/>
    <!-- row 3 -->
    <rect x="0"   y="128" width="64"  height="64" fill="#70707a"/>
    <rect x="64"  y="128" width="64"  height="64" fill="#7c7c85"/>
    <rect x="128" y="128" width="64"  height="64" fill="#85858f"/>
    <rect x="192" y="128" width="64"  height="64" fill="#6a6a73"/>
    <rect x="256" y="128" width="64"  height="64" fill="#7c7c85"/>
    <rect x="320" y="128" width="64"  height="64" fill="#80808a"/>
    <rect x="384" y="128" width="64"  height="64" fill="#6f6f78"/>
    <rect x="448" y="128" width="64"  height="64" fill="#77777f"/>
    <!-- row 4 -->
    <rect x="-32" y="192" width="64"  height="64" fill="#7e7e88"/>
    <rect x="32"  y="192" width="64"  height="64" fill="#6c6c75"/>
    <rect x="96"  y="192" width="64"  height="64" fill="#82828c"/>
    <rect x="160" y="192" width="64"  height="64" fill="#72727b"/>
    <rect x="224" y="192" width="64"  height="64" fill="#7c7c85"/>
    <rect x="288" y="192" width="64"  height="64" fill="#6f6f78"/>
    <rect x="352" y="192" width="64"  height="64" fill="#85858f"/>
    <rect x="416" y="192" width="64"  height="64" fill="#6a6a73"/>
    <rect x="480" y="192" width="64"  height="64" fill="#7e7e88"/>
    <!-- row 5 -->
    <rect x="0"   y="256" width="64"  height="64" fill="#7c7c85"/>
    <rect x="64"  y="256" width="64"  height="64" fill="#80808a"/>
    <rect x="128" y="256" width="64"  height="64" fill="#6f6f78"/>
    <rect x="192" y="256" width="64"  height="64" fill="#77777f"/>
    <rect x="256" y="256" width="64"  height="64" fill="#7c7c85"/>
    <rect x="320" y="256" width="64"  height="64" fill="#85858f"/>
    <rect x="384" y="256" width="64"  height="64" fill="#6a6a73"/>
    <rect x="448" y="256" width="64"  height="64" fill="#7c7c85"/>
    <!-- row 6 -->
    <rect x="-32" y="320" width="64"  height="64" fill="#72727b"/>
    <rect x="32"  y="320" width="64"  height="64" fill="#82828c"/>
    <rect x="96"  y="320" width="64"  height="64" fill="#6c6c75"/>
    <rect x="160" y="320" width="64"  height="64" fill="#7e7e88"/>
    <rect x="224" y="320" width="64"  height="64" fill="#6f6f78"/>
    <rect x="288" y="320" width="64"  height="64" fill="#80808a"/>
    <rect x="352" y="320" width="64"  height="64" fill="#77777f"/>
    <rect x="416" y="320" width="64"  height="64" fill="#7c7c85"/>
    <rect x="480" y="320" width="64"  height="64" fill="#6d6d76"/>
    <!-- row 7 -->
    <rect x="0"   y="384" width="64"  height="64" fill="#82828c"/>
    <rect x="64"  y="384" width="64"  height="64" fill="#6c6c75"/>
    <rect x="128" y="384" width="64"  height="64" fill="#7e7e88"/>
    <rect x="192" y="384" width="64"  height="64" fill="#72727b"/>
    <rect x="256" y="384" width="64"  height="64" fill="#7c7c85"/>
    <rect x="320" y="384" width="64"  height="64" fill="#6f6f78"/>
    <rect x="384" y="384" width="64"  height="64" fill="#85858f"/>
    <rect x="448" y="384" width="64"  height="64" fill="#6a6a73"/>
    <!-- row 8 -->
    <rect x="-32" y="448" width="64"  height="64" fill="#77777f"/>
    <rect x="32"  y="448" width="64"  height="64" fill="#80808a"/>
    <rect x="96"  y="448" width="64"  height="64" fill="#6f6f78"/>
    <rect x="160" y="448" width="64"  height="64" fill="#7c7c85"/>
    <rect x="224" y="448" width="64"  height="64" fill="#85858f"/>
    <rect x="288" y="448" width="64"  height="64" fill="#6a6a73"/>
    <rect x="352" y="448" width="64"  height="64" fill="#7e7e88"/>
    <rect x="416" y="448" width="64"  height="64" fill="#72727b"/>
    <rect x="480" y="448" width="64"  height="64" fill="#82828c"/>
  </g>
  <!-- subtle highlights on each brick -->
  <g fill="#ffffff" opacity="0.08">
    <rect x="6" y="6" width="52" height="6"/>
    <rect x="70" y="6" width="52" height="6"/>
    <rect x="134" y="6" width="52" height="6"/>
    <rect x="198" y="6" width="52" height="6"/>
    <rect x="262" y="6" width="52" height="6"/>
    <rect x="326" y="6" width="52" height="6"/>
    <rect x="390" y="6" width="52" height="6"/>
    <rect x="454" y="6" width="52" height="6"/>
  </g>
</svg>
