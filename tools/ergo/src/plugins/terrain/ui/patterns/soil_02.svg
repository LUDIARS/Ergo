    <circle cx="380" cy="260" r="2.4"/>
    <circle cx="260" cy="360" r="2.6"/>
    <circle cx="420" cy="380" r="2.6"/>
    <circle cx="140" cy="420" r="2.2"/>
    <circle cx="280" cy="460" r="2.6"/>
