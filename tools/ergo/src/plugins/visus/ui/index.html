<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Visus Editor</title>
<style>
  :root {
    --bg:#1a1d21; --panel:#23272d; --line:#343a42;
    --text:#e7eaef; --muted:#8a93a0;
    --accent:#7cc4ff; --bad:#ff7d7d; --ok:#7cd47c;
    --sel:#2f4a66;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%; overflow: hidden;
  }
  body { display: grid; grid-template-rows: auto 1fr; height: 100vh; }

  header {
    padding: .6rem 1rem; background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;
  }
  header h1 { font-size: 1rem; margin: 0; font-weight: 600; letter-spacing: .02em; }
  header select, header button {
    background: #2b2f36; color: var(--text); border: 1px solid var(--line);
    padding: .3rem .55rem; border-radius: 3px; font-size: .82rem;
    font-family: ui-monospace, monospace; cursor: pointer;
  }
  header select:hover, header button:hover { border-color: var(--accent); }
  header .status {
    font-size: .8rem; color: var(--muted); margin-left: auto;
    font-family: ui-monospace, monospace;
  }
  header .status.ok  { color: var(--ok); }
  header .status.bad { color: var(--bad); }

  .split { display: grid; grid-template-columns: 320px 1fr; min-height: 0; }

  #list {
    background: #1e2127; border-right: 1px solid var(--line);
    overflow-y: auto; min-height: 0;
  }
  #list .empty { color: var(--muted); font-size: .85rem; padding: 1rem; }
  .file {
    padding: .4rem .7rem; cursor: pointer;
    font-family: ui-monospace, monospace; font-size: .82rem;
    border-left: 3px solid transparent;
    border-bottom: 1px solid var(--line);
  }
  .file:hover { background: #262b31; }
  .file.sel { background: var(--sel); border-left-color: var(--accent); }
  .file .name { font-weight: 600; color: var(--text); }
  .file .path { color: var(--muted); font-size: .72rem; margin-top: .15rem; }
  .file .meta {
    color: var(--muted); font-size: .7rem; margin-top: .25rem;
    display: flex; gap: .6rem; flex-wrap: wrap;
  }
  .file .badge {
    display: inline-block; padding: .05rem .35rem; border-radius: 3px;
    background: #2b2f36; border: 1px solid var(--line);
    text-transform: uppercase; letter-spacing: .04em; font-size: .68rem;
  }

  main { display: grid; grid-template-rows: auto auto 1fr auto; min-height: 0; padding: 0; }
  #toolbar {
    padding: .55rem 1rem; border-bottom: 1px solid var(--line);
    display: flex; gap: .7rem; align-items: center; flex-wrap: wrap;
    background: var(--panel);
  }

  /* ── CUSTOM kind structured shader form ── */
  #shaderForm {
    border-bottom: 1px solid var(--line);
    background: #1f232a;
    display: none;            /* shown only when geometry.kind == "custom" */
  }
  #shaderForm.visible { display: block; }
  #shaderForm .head {
    padding: .45rem 1rem; display: flex; gap: .6rem; align-items: center;
    cursor: pointer; user-select: none;
  }
  #shaderForm .head h2 {
    font-size: .82rem; margin: 0; font-weight: 600; color: var(--accent);
    font-family: ui-monospace, monospace;
  }
  #shaderForm .head .hint { font-size: .72rem; color: var(--muted); margin-left: auto; }
  #shaderForm .body { padding: .2rem 1rem .7rem; }
  #shaderForm.collapsed .body { display: none; }
  .stage-row {
    display: grid; grid-template-columns: 70px 1fr; gap: .5rem;
    align-items: center; margin: .35rem 0;
  }
  .stage-row label {
    font-family: ui-monospace, monospace; font-size: .76rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .04em;
  }
  .stage-row label.req::after { content: " *"; color: var(--accent); }
  .stage-row input {
    background: #14171b; color: var(--text); border: 1px solid var(--line);
    padding: .32rem .5rem; border-radius: 4px; font-size: .78rem;
    font-family: ui-monospace, monospace; outline: none;
  }
  .stage-row input:focus { border-color: var(--accent); }
  #shaderForm .formNote {
    font-size: .72rem; color: var(--muted); margin-top: .45rem;
    font-family: ui-monospace, monospace; line-height: 1.5;
  }
  #shaderForm .formNote.warn { color: var(--bad); }
  #shaderForm .formNote.good { color: var(--ok); }
  #toolbar .label {
    font-size: .8rem; color: var(--muted); font-family: ui-monospace, monospace;
    margin-right: auto; word-break: break-all;
  }
  #toolbar button {
    background: #2b2f36; color: var(--text); border: 1px solid var(--line);
    padding: .35rem .8rem; border-radius: 3px; font-size: .82rem; cursor: pointer;
  }
  #toolbar button.primary { background: var(--accent); color: #0b1218; border-color: var(--accent); font-weight: 600; }
  #toolbar button:disabled { opacity: .4; cursor: not-allowed; }

  #editor {
    width: 100%; height: 100%; resize: none; border: none; outline: none;
    background: #14171b; color: var(--text);
    font-family: ui-monospace, monospace; font-size: .82rem; line-height: 1.45;
    padding: 1rem;
  }
  #editor:disabled { color: var(--muted); }

  footer {
    padding: .45rem 1rem; border-top: 1px solid var(--line);
    background: var(--panel); font-size: .76rem; color: var(--muted);
    font-family: ui-monospace, monospace;
    display: flex; gap: .8rem; align-items: center;
  }
  footer .ok  { color: var(--ok); }
  footer .bad { color: var(--bad); }
</style>
</head>
<body>
<header>
  <h1>👁 Visus Editor</h1>
  <select id="rootSel" title="プロジェクト root を選ぶ"></select>
  <button id="rescan" title="再 scan">↻ rescan</button>
  <span id="status" class="status">…</span>
</header>

<div class="split">
  <aside id="list">
    <div class="empty">root を選んで rescan</div>
  </aside>

  <main>
    <div id="toolbar">
      <span class="label" id="curPath">(no file selected)</span>
      <button id="reload" disabled>reload</button>
      <button id="save" class="primary" disabled>save</button>
    </div>

    <!-- CUSTOM kind 専用のシェーダ参照フォーム (geometry.kind == "custom" のときだけ表示) -->
    <section id="shaderForm">
      <div class="head" id="shaderFormHead">
        <h2>⚙ Custom Shader (CUSTOM kind)</h2>
        <span class="hint">geometry.shader_stages — vert/frag は固定描画に必須</span>
      </div>
      <div class="body">
        <div class="stage-row">
          <label class="req" for="stageVert">vert</label>
          <input id="stageVert" placeholder="shaders/custom.vert.spv (compiled SPIR-V)">
        </div>
        <div class="stage-row">
          <label class="req" for="stageFrag">frag</label>
          <input id="stageFrag" placeholder="shaders/custom.frag.spv (compiled SPIR-V)">
        </div>
        <div class="stage-row">
          <label for="stageComp">comp</label>
          <input id="stageComp" placeholder="(phase 2) compute stage SPIR-V — 任意">
        </div>
        <div class="stage-row">
          <label for="shaderHandle">handle</label>
          <input id="shaderHandle" placeholder='geometry.shader — "none" または "handle:&lt;u32&gt;"'>
        </div>
        <div class="formNote" id="shaderFormNote">—</div>
      </div>
    </section>

    <textarea id="editor" spellcheck="false" disabled placeholder="左で .visus.json を選択するとここで編集できます"></textarea>
    <footer><span id="parseStatus">—</span></footer>
  </main>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const rootSel  = $("rootSel");
  const statusEl = $("status");
  const listEl   = $("list");
  const editor   = $("editor");
  const curPath  = $("curPath");
  const btnReload= $("reload");
  const btnSave  = $("save");
  const btnRescan= $("rescan");
  const parseEl  = $("parseStatus");

  const shaderForm     = $("shaderForm");
  const shaderFormHead = $("shaderFormHead");
  const stageVert      = $("stageVert");
  const stageFrag      = $("stageFrag");
  const stageComp      = $("stageComp");
  const shaderHandle   = $("shaderHandle");
  const shaderFormNote = $("shaderFormNote");

  let current = null;   // { root_index, rel_path, content }
  let dirty   = false;
  let syncing = false;  // form ↔ editor の相互更新ループ防止

  function setStatus(text, kind) {
    statusEl.textContent = text;
    statusEl.className = "status" + (kind ? " " + kind : "");
  }

  async function fetchJson(url, opts) {
    const r = await fetch(url, opts);
    return r.json();
  }

  async function loadRoots() {
    const r = await fetchJson("./api/roots");
    rootSel.innerHTML = "";
    for (const root of r.roots ?? []) {
      const opt = document.createElement("option");
      opt.value = String(root.index);
      opt.textContent = `[${root.index}] ${root.path}`;
      rootSel.appendChild(opt);
    }
    if ((r.roots ?? []).length === 0) {
      const opt = document.createElement("option");
      opt.value = "0"; opt.textContent = "(VISUS_PROJECT_ROOTS 未設定)";
      rootSel.appendChild(opt);
    }
  }

  function fileItem(file) {
    const div = document.createElement("div");
    div.className = "file";
    div.dataset.path = file.rel_path;
    div.innerHTML = `
      <div class="name">${escape(file.name) || "(no name)"}</div>
      <div class="path">${escape(file.rel_path)}</div>
      <div class="meta">
        <span class="badge">${escape(file.geometry_kind)}</span>
        <span>materials: ${file.materials_count}</span>
        <span>${(file.bytes / 1024).toFixed(1)} KB</span>
      </div>
    `;
    div.addEventListener("click", () => loadFile(file.rel_path));
    return div;
  }

  function escape(s) {
    return String(s ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
  }

  async function rescan() {
    const idx = Number(rootSel.value);
    setStatus("scanning…");
    try {
      const r = await fetchJson(`./api/scan?root=${idx}`);
      if (!r.ok) { setStatus(r.err ?? "scan failed", "bad"); return; }
      listEl.innerHTML = "";
      if ((r.files ?? []).length === 0) {
        listEl.innerHTML = `<div class="empty">${escape(r.root)} に .visus.json なし</div>`;
      } else {
        for (const f of r.files) listEl.appendChild(fileItem(f));
      }
      setStatus(`${r.files?.length ?? 0} files`, "ok");
    } catch (e) {
      setStatus(String(e), "bad");
    }
  }

  async function loadFile(rel) {
    if (dirty && !confirm("未保存の変更があります. 破棄しますか?")) return;
    const idx = Number(rootSel.value);
    setStatus("loading…");
    try {
      const r = await fetchJson(`./api/load?root=${idx}&path=${encodeURIComponent(rel)}`);
      if (!r.ok) { setStatus(r.err ?? "load failed", "bad"); return; }
      current = { root_index: idx, rel_path: rel, content: r.content };
      editor.value = r.content;
      editor.disabled = false;
      curPath.textContent = rel;
      btnReload.disabled = false;
      btnSave.disabled   = false;
      dirty = false;
      validateJson();
      syncFormFromEditor();
      setStatus("loaded", "ok");
      // select highlight
      for (const el of listEl.querySelectorAll(".file")) {
        el.classList.toggle("sel", el.dataset.path === rel);
      }
    } catch (e) {
      setStatus(String(e), "bad");
    }
  }

  async function save() {
    if (!current) return;
    if (!validateJson()) {
      setStatus("invalid JSON — fix before save", "bad");
      return;
    }
    setStatus("saving…");
    try {
      const r = await fetchJson("./api/save", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          root:    current.root_index,
          path:    current.rel_path,
          content: editor.value,
        }),
      });
      if (!r.ok) { setStatus(r.err ?? "save failed", "bad"); return; }
      current.content = editor.value;
      dirty = false;
      setStatus("saved", "ok");
    } catch (e) {
      setStatus(String(e), "bad");
    }
  }

  function reload() {
    if (!current) return;
    if (dirty && !confirm("未保存の変更があります. 破棄しますか?")) return;
    loadFile(current.rel_path);
  }

  function validateJson() {
    try {
      JSON.parse(editor.value);
      parseEl.textContent = "JSON: valid";
      parseEl.className = "ok";
      return true;
    } catch (e) {
      parseEl.textContent = "JSON: " + String(e).replace(/^SyntaxError:\s*/, "");
      parseEl.className = "bad";
      return false;
    }
  }

  // ════════════════════════════════════════════════════════════════
  //  CUSTOM kind 構造化フォーム
  //
  //  Visus の CUSTOM kind は固定 vert+frag のカスタムシェーダを選んで
  //  描画に反映する seam (Pictor `spec/rendering-extensibility-design.md`
  //  §2 phase 1)。 render_pipeline プラグインの構造化フォーム方式に倣い、
  //  生 JSON を直接いじらず geometry.shader_stages / geometry.shader を
  //  フォームで編集する。 phase 1 のスコープは「シェーダ参照の選択/編集」
  //  のみ — それ以外のフィールドは従来どおり下の生エディタで触る。
  // ════════════════════════════════════════════════════════════════

  /// 現在のエディタ JSON が CUSTOM kind かを見てフォームの表示/値を更新する。
  function syncFormFromEditor() {
    let obj;
    try { obj = JSON.parse(editor.value); }
    catch { shaderForm.classList.remove("visible"); return; }

    const kind = String(obj?.geometry?.kind ?? "none");
    const isCustom = kind === "custom";
    shaderForm.classList.toggle("visible", isCustom);
    if (!isCustom) return;

    const stages = obj?.geometry?.shader_stages ?? {};
    syncing = true;
    stageVert.value    = String(stages?.vert?.local_path ?? "");
    stageFrag.value    = String(stages?.frag?.local_path ?? "");
    stageComp.value    = String(stages?.comp?.local_path ?? "");
    shaderHandle.value = String(obj?.geometry?.shader ?? "none");
    syncing = false;
    refreshFormNote();
  }

  /// フォームの値をエディタ JSON に書き戻す。 既存の他フィールドは保持。
  function syncEditorFromForm() {
    if (syncing) return;
    let obj;
    try { obj = JSON.parse(editor.value); }
    catch {
      shaderFormNote.textContent =
        "エディタの JSON が壊れているためフォーム反映を保留中";
      shaderFormNote.className = "formNote warn";
      return;
    }
    obj.geometry = obj.geometry ?? {};
    obj.geometry.shader_stages = obj.geometry.shader_stages ?? {};
    const ss = obj.geometry.shader_stages;

    // ResourceRef の最小形。 Pictor の serializer は欠けたキーを既定値で
    // 補完するので local_path だけ書けば足りる (remote 設定は生エディタで)。
    const setStage = (name, path) => {
      const p = path.trim();
      const prev = ss[name] && typeof ss[name] === "object" ? ss[name] : {};
      ss[name] = { ...prev, local_path: p };
    };
    setStage("vert", stageVert.value);
    setStage("frag", stageFrag.value);
    setStage("comp", stageComp.value);

    const h = shaderHandle.value.trim();
    obj.geometry.shader = h === "" ? "none" : h;

    syncing = true;
    editor.value = JSON.stringify(obj, null, 2);
    syncing = false;
    dirty = current && (editor.value !== current.content);
    validateJson();
    refreshFormNote();
  }

  /// vert/frag の充足とハンドル整合をフォーム下に表示する。
  function refreshFormNote() {
    const v = stageVert.value.trim();
    const f = stageFrag.value.trim();
    const h = shaderHandle.value.trim();
    const handleOk = h === "" || h === "none" || /^handle:\d+$/.test(h);

    if (!handleOk) {
      shaderFormNote.textContent =
        'handle は "none" または "handle:<u32>" の形式で指定してください';
      shaderFormNote.className = "formNote warn";
    } else if (v && f) {
      shaderFormNote.textContent =
        "vert+frag 揃い — phase 1 のカスタムシェーダ pipeline で描画されます";
      shaderFormNote.className = "formNote good";
    } else {
      shaderFormNote.textContent =
        "vert / frag が未設定 — 両方の SPIR-V を指定すると CUSTOM 描画が有効になります";
      shaderFormNote.className = "formNote warn";
    }
  }

  for (const el of [stageVert, stageFrag, stageComp, shaderHandle]) {
    el.addEventListener("input", syncEditorFromForm);
  }
  shaderFormHead.addEventListener("click", () => {
    shaderForm.classList.toggle("collapsed");
  });

  rootSel.addEventListener("change", rescan);
  btnRescan.addEventListener("click", rescan);
  btnSave.addEventListener("click", save);
  btnReload.addEventListener("click", reload);
  editor.addEventListener("input", () => {
    dirty = current && (editor.value !== current.content);
    validateJson();
    syncFormFromEditor();
  });

  // 別クライアントの save を WS で拾って、 現在開いてるファイルなら status を出す
  try {
    const ws = new WebSocket(`ws://${location.host}/visus/ws`);
    ws.addEventListener("open",   () => setStatus("ws open", "ok"));
    ws.addEventListener("message", (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.op === "saved" && current &&
            msg.root_index === current.root_index &&
            msg.rel_path === current.rel_path)
        {
          setStatus("(別クライアントが上書きしました — reload 推奨)", "bad");
        }
      } catch {}
    });
  } catch {}

  loadRoots().then(rescan);
})();
</script>
</body>
</html>
