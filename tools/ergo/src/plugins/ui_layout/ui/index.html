<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>UI Layout Editor</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <strong>UI Layout Editor</strong>
  <input id="filePath" class="grow" placeholder="E:/.../*.uilayout.json" />
  <button id="openBtn">Open</button>
  <button id="saveBtn">Save</button>
  <select id="newType">
    <option value="container">container</option><option value="rect">rect</option><option value="text">text</option>
    <option value="image">image</option><option value="nine_slice">nine_slice</option><option value="vector">vector</option>
  </select>
  <button id="addChildBtn">Add Child</button>
  <button id="deleteBtn">Delete</button>
  <button id="pushPatchBtn">Push Patch</button>
  <button id="pullStateBtn">Pull State</button>
  <span id="status">idle</span>
</header>
<main>
  <aside>
    <h3 class="paneTitle">Hierarchy</h3>
    <div id="tree"></div>
  </aside>
  <section id="canvasWrap">
    <canvas id="canvas" width="1280" height="720"></canvas>
  </section>
  <div id="props">
    <h3 class="paneTitle">Properties</h3>
    <div id="propBody"></div>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
