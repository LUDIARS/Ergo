<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Level Placer</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<header>
    <nav class="tabs">
        <button class="tab active" data-mode="blocks">Blocks</button>
        <button class="tab" data-mode="stages">Stages</button>
        <button class="tab" data-mode="enemies">Enemy</button>
        <button class="tab" data-mode="skill-blocks">SkillBlock</button>
    </nav>
    <span class="store-path" id="store-path"></span>
    <span class="status" id="status">loading…</span>
</header>

<!-- ============================================================ -->
<!-- BLOCKS MODE                                                   -->
<!-- ============================================================ -->
<main class="view" id="view-blocks">
    <aside class="sidebar">
        <div class="sidebar-head">
            <h2>Blocks</h2>
            <button id="block-add" class="ghost">＋</button>
        </div>
        <ul id="block-list"></ul>
    </aside>

    <section class="editor" id="block-editor">
        <p class="hint">左から block を選択してください。</p>
    </section>
</main>

<!-- ============================================================ -->
<!-- STAGES MODE                                                   -->
<!-- ============================================================ -->
<main class="view hidden" id="view-stages">
    <aside class="sidebar">
        <div class="sidebar-head">
            <h2>Stages</h2>
            <button id="stage-add" class="ghost">＋</button>
        </div>
        <ul id="stage-list"></ul>
    </aside>

    <section class="editor" id="stage-editor">
        <p class="hint">左から stage を選択してください。</p>
    </section>
</main>

<!-- ============================================================ -->
<!-- ENEMIES MODE                                                  -->
<!-- ============================================================ -->
<main class="view hidden" id="view-enemies">
    <aside class="sidebar">
        <div class="sidebar-head">
            <h2>Enemies</h2>
            <button id="enemy-add" class="ghost">＋</button>
        </div>
        <ul id="enemy-list"></ul>
    </aside>

    <section class="editor" id="enemy-editor">
        <p class="hint">左から enemy を選択してください。</p>
    </section>
</main>

<!-- ============================================================ -->
<!-- SKILL BLOCKS MODE                                             -->
<!-- ============================================================ -->
<main class="view hidden" id="view-skill-blocks">
    <aside class="sidebar">
        <div class="sidebar-head">
            <h2>SkillBlocks</h2>
            <button id="sb-add" class="ghost">＋</button>
        </div>
        <ul id="sb-list"></ul>
    </aside>

    <section class="editor" id="sb-editor">
        <p class="hint">左から skill block を選択してください。</p>
    </section>
</main>

<!-- ============================================================ -->
<!-- CELL POPOVER (typed object editor)                            -->
<!-- ============================================================ -->
<dialog id="cell-dialog">
    <form method="dialog">
        <header>
            <span id="cell-coord">R?, C?</span>
            <button type="button" class="ghost" id="cell-close">×</button>
        </header>

        <div class="cell-dialog-body">
            <h3>配置済みオブジェクト</h3>
            <ul id="cell-objects"></ul>

            <h3>新規追加</h3>
            <label class="row-label">type
                <select id="new-obj-type">
                    <option value="Enemy">Enemy</option>
                    <option value="SkillBlock">SkillBlock</option>
                    <option value="SkillBox">SkillBox</option>
                    <option value="Special">Special (TBD)</option>
                </select>
            </label>
            <div id="new-obj-fields" class="new-obj-fields"></div>
            <div class="add-row">
                <button type="button" class="primary" id="new-obj-add">追加</button>
            </div>
        </div>
    </form>
</dialog>

<script type="module" src="./app.js"></script>
</body>
</html>
