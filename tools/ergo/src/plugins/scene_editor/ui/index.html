<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Editor — ergo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="toolbar">
  <h1>🎬 Scene Editor</h1>
  <span id="status" class="disconnected">○ disconnected</span>
</div>

<div id="main">
  <div id="tree-panel">
    <div id="tree-header">Scene Tree</div>
    <div id="tree-scroll">
      <div class="empty-tree">No scenes mounted.<br>Connect an engine client<br>and push a scene via WS.</div>
    </div>
  </div>

  <div id="inspector-panel">
    <div id="inspector-header">Inspector</div>
    <div id="inspector-scroll">
      <div id="inspector-empty">Select an actor in the scene tree.</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
