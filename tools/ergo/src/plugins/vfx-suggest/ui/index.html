<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VFX Suggest</title>
<style>
  :root {
    --bg:#1a1d21; --panel:#23272d; --panel2:#2a2e35; --line:#343a42;
    --text:#e7eaef; --muted:#8a93a0;
    --accent:#7cc4ff; --ok:#7cd47c; --bad:#ff7d7d; --warn:#f5c542;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; min-height:100%;
               background:var(--bg); color:var(--text);
               font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               font-size:14px; }
  #app { max-width:900px; margin:0 auto; padding:1rem; }

  /* header */
  header { display:flex; align-items:center; gap:.6rem; margin-bottom:1rem; flex-wrap:wrap; }
  header h1 { font-size:1rem; font-weight:600; margin:0; }
  .badge { font-size:.7rem; padding:.2rem .5rem; border-radius:3px;
           border:1px solid var(--line); color:var(--muted); font-family:monospace; }
  .badge.ok  { color:var(--ok);   border-color:var(--ok); }
  .badge.bad { color:var(--bad);  border-color:var(--bad); }
  .badge.on  { color:var(--ok);   border-color:var(--ok); }
  .badge.off { color:var(--muted); border-color:var(--line); }

  /* form */
  .form-row { display:flex; gap:.5rem; align-items:stretch; flex-wrap:wrap; margin-bottom:.6rem; }
  select, input[type=text], input[type=number] {
    background:var(--panel); color:var(--text); border:1px solid var(--line);
    border-radius:4px; padding:.4rem .6rem; font-size:.85rem;
  }
  select:focus, input:focus { outline:1px solid var(--accent); border-color:var(--accent); }
  #scene { flex:1; min-width:200px; }
  button {
    background:var(--panel2); color:var(--text); border:1px solid var(--line);
    border-radius:4px; padding:.4rem .8rem; font-size:.82rem; cursor:pointer;
    transition: border-color .15s;
  }
  button:hover { border-color:var(--accent); }
  button:disabled { opacity:.45; cursor:default; }
  #gen-btn { background:#1e4068; border-color:var(--accent); color:var(--accent); font-weight:600; }
  #gen-btn:hover:not(:disabled) { background:#24527f; }

  /* status */
  #status { font-size:.8rem; color:var(--muted); min-height:1.2rem; margin-bottom:.8rem; }
  #status.err { color:var(--bad); }

  /* cards */
  #cards { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:.75rem; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:.75rem; }
  .card-name { font-weight:600; font-size:.9rem; margin-bottom:.2rem; }
  .card-swatch { height:10px; border-radius:3px; margin:.3rem 0; }
  .card-meta { font-size:.72rem; color:var(--muted); font-family:monospace; line-height:1.6; margin:.25rem 0; }
  .card-rationale { font-size:.78rem; color:#b0b8c4; margin:.35rem 0 .6rem; line-height:1.5; }
  .card-actions { display:flex; gap:.4rem; flex-wrap:wrap; }
  .card-actions button { font-size:.75rem; padding:.25rem .55rem; }
  .btn-preview { color:var(--ok);   border-color:var(--ok); }
  .btn-copy    { color:var(--accent); }
  .btn-dl      { color:var(--muted); }
  .btn-ks      { color:var(--warn);  border-color:var(--warn); }

  /* catalog */
  details { margin-top:1.5rem; border:1px solid var(--line); border-radius:5px; }
  summary { padding:.5rem .75rem; font-size:.82rem; cursor:pointer; color:var(--muted); user-select:none; }
  summary:hover { color:var(--text); }
  #catalog-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
                  gap:.5rem; padding:.5rem .75rem .75rem; }

  /* loading spinner */
  @keyframes spin { to { transform:rotate(360deg); } }
  .spin { display:inline-block; width:12px; height:12px; border:2px solid var(--muted);
          border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite;
          vertical-align:middle; margin-right:.35rem; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🎆 VFX Suggest</h1>
    <span id="badge-backend" class="badge">backend: …</span>
    <span id="badge-particle" class="badge off">particle: off</span>
  </header>

  <div class="form-row">
    <select id="game">
      <option value="ks">KuzuSurvivors</option>
      <option value="ac">AdventureCube</option>
      <option value="ul">UniLand</option>
      <option value="generic">汎用</option>
    </select>
    <input id="scene" type="text" placeholder="場面を入力 (例: 雷スキルがヒット)" />
    <select id="count">
      <option value="1">1件</option>
      <option value="2">2件</option>
      <option value="3" selected>3件</option>
      <option value="4">4件</option>
    </select>
    <button id="gen-btn" onclick="generate()">▶ 生成</button>
  </div>

  <div id="status"></div>
  <div id="cards"></div>

  <details>
    <summary>📚 参考カタログ (クリックで展開)</summary>
    <div id="catalog-grid"></div>
  </details>
</div>

<script>
// ── particle WS bridge ───────────────────────────────────────────────────────
let pws = null;
function connectParticle() {
  try {
    pws = new WebSocket("ws://" + location.host + "/particle/ws");
    pws.onopen  = () => updateParticleBadge(true);
    pws.onclose = () => { updateParticleBadge(false); setTimeout(connectParticle, 2000); };
    pws.onerror = () => {};
  } catch { updateParticleBadge(false); setTimeout(connectParticle, 2000); }
}
function updateParticleBadge(on) {
  const el = document.getElementById("badge-particle");
  el.textContent = "particle: " + (on ? "on" : "off");
  el.className   = "badge " + (on ? "on" : "off");
}
function sendToParticle(config) {
  if (!pws || pws.readyState !== 1) {
    setStatus("particle プラグインが未接続です。particle タブを開いて再試行してください。", true);
    return;
  }
  pws.send(JSON.stringify({ op: "replace", config }));
  setStatus("particle プラグインに送信しました ✓");
}

// ── health badge ─────────────────────────────────────────────────────────────
async function loadHealth() {
  try {
    const r = await fetch("/vfx-suggest/api/health").then(x => x.json());
    const el = document.getElementById("badge-backend");
    el.textContent = `${r.backend ?? "?"}: ${r.model ?? "?"}`;
    el.className   = "badge " + (r.ok ? "ok" : "bad");
  } catch { /* ignore */ }
}

// ── catalog ──────────────────────────────────────────────────────────────────
async function loadCatalog() {
  try {
    const presets = await fetch("/vfx-suggest/api/catalog").then(x => x.json());
    renderCards(presets, document.getElementById("catalog-grid"), true);
  } catch { /* ignore */ }
}

// ── generate ─────────────────────────────────────────────────────────────────
let generating = false;
async function generate() {
  if (generating) return;
  const scene = document.getElementById("scene").value.trim();
  if (!scene) { setStatus("場面を入力してください。", true); return; }

  generating = true;
  const btn = document.getElementById("gen-btn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>生成中…';
  setStatus("");
  document.getElementById("cards").innerHTML = "";

  try {
    const res = await fetch("/vfx-suggest/api/generate", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        game:  document.getElementById("game").value,
        scene: scene,
        count: parseInt(document.getElementById("count").value, 10),
      }),
    }).then(x => x.json());

    if (!res.ok) {
      setStatus("エラー: " + (res.err ?? "不明"), true);
    } else {
      renderCards(res.presets, document.getElementById("cards"), false);
      setStatus(`${res.presets.length} 件生成完了`);
    }
  } catch (e) {
    setStatus("通信エラー: " + e.message, true);
  } finally {
    generating = false;
    btn.disabled = false;
    btn.innerHTML = "▶ 生成";
  }
}

// Enter key submits
document.getElementById("scene").addEventListener("keydown", e => {
  if (e.key === "Enter") generate();
});

// ── render cards ─────────────────────────────────────────────────────────────
function rgbaCss([r, g, b, a]) {
  return `rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},${a.toFixed(2)})`;
}
function swatchGradient(c) {
  const cs = c.overLife?.colorStart ?? [1, 0.75, 0.25, 1];
  const ce = c.overLife?.colorEnd   ?? [0.7, 0.1, 0, 0];
  return `linear-gradient(to right, ${rgbaCss(cs)}, ${rgbaCss(ce)})`;
}
function metaLine(c) {
  const em = c.emission ?? {};
  const ini = c.initial ?? {};
  const blend = c.render?.blend ?? "additive";
  const shape = c.render?.shape ?? "circle";
  return [
    `rate ${em.rate ?? "?"} / max ${em.maxAlive ?? "?"}`,
    `life ${ini.lifetimeMin ?? "?"}–${ini.lifetimeMax ?? "?"}s`,
    `size ${ini.size ?? "?"}`,
    `${blend} · ${shape}`,
  ].join(" · ");
}

function renderCards(presets, container, compact) {
  container.innerHTML = "";
  for (const p of presets) {
    const cfg = p.config ?? {};
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-swatch" style="background:${swatchGradient(cfg)}"></div>
      <div class="card-meta">${esc(metaLine(cfg))}</div>
      ${compact ? "" : `<div class="card-rationale">${esc(p.rationale)}</div>`}
      <div class="card-actions">
        <button class="btn-preview" title="particle プラグインに送りプレビュー">▷ preview</button>
        <button class="btn-copy"    title="JSON をコピー">📋 copy</button>
        <button class="btn-dl"      title="JSON をダウンロード">↓ DL</button>
        <button class="btn-ks"      title="KS GPU EmitterDescriptor JSON をダウンロード (VfxCatalog::register_from_json 用)">↗ KS</button>
      </div>`;
    div.querySelector(".btn-preview").onclick = () => sendToParticle(cfg);
    div.querySelector(".btn-copy").onclick    = () => copyConfig(cfg, p.name);
    div.querySelector(".btn-dl").onclick      = () => downloadConfig(cfg, p.name);
    div.querySelector(".btn-ks").onclick      = () => exportKsEmitter(cfg, p.name);
    container.appendChild(div);
  }
}

// ── helpers ───────────────────────────────────────────────────────────────────
function setStatus(msg, isErr = false) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className   = isErr ? "err" : "";
}
function esc(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
async function copyConfig(config, name) {
  try {
    await navigator.clipboard.writeText(JSON.stringify(config, null, 2));
    setStatus(`"${name}" を JSON コピーしました`);
  } catch { setStatus("クリップボードへのコピーに失敗しました。", true); }
}
function downloadConfig(config, name) {
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: "application/json" });
  const a    = Object.assign(document.createElement("a"), {
    href:     URL.createObjectURL(blob),
    download: `${name.replace(/\s+/g,"_")}.json`,
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── KS GPU EmitterDescriptor エクスポート (クライアント側変換) ────────────────
// ergo::shuriken_migrator::EmitterDescriptorToJson と同形式の JSON を出力する。
// 制約: color-over-lifetime は未シリアライズ (start_color のみ)、
//       size_over_lifetime は two_constants 近似。
function toKsEmitter(cfg, key) {
  const ini = cfg.initial ?? {};
  const ol  = cfg.overLife ?? {};
  const em  = cfg.emission ?? {};
  const re  = cfg.render   ?? {};
  const g   = cfg.forces?.gravity ?? [0, 120];
  const c   = ini.color ?? [1, 0.75, 0.25, 1];
  const sStart = typeof ol.sizeStart === "number" ? ol.sizeStart : 1;
  const sEnd   = typeof ol.sizeEnd   === "number" ? ol.sizeEnd   : 0;
  const minmax0 = v => ({ mode: 0, min: +v, max: +v });
  const minmax2 = (lo, hi) => Math.abs(hi - lo) < 1e-6
    ? minmax0(lo) : { mode: 2, min: +lo, max: +hi };
  return {
    name:             key ?? cfg.name ?? "untitled",
    duration:         0,
    loop:             true,
    start_lifetime:   minmax2(ini.lifetimeMin ?? 0.7, ini.lifetimeMax ?? 1.4),
    start_speed:      minmax2(ini.speedMin    ?? 80,  ini.speedMax    ?? 180),
    start_size:       minmax0(ini.size        ?? 8),
    start_color:      [+c[0], +c[1], +c[2], +c[3]],
    max_particles:    em.maxAlive ?? 400,
    simulation_space: 0,
    gravity_modifier: +(+g[1] / 9.81).toFixed(4),
    rate_over_time:   minmax0(em.rate ?? 60),
    shape:            1,
    sphere_radius:    ini.positionRadius ?? 4,
    cone_radius:      ini.positionRadius ?? 4,
    cone_angle_deg:   (ini.velocityAngleSpreadDeg ?? 60) / 2,
    shape_scale:      [1, 1, 1],
    size_over_lifetime: minmax2(sEnd, sStart),
    blend_mode:       re.blend === "alpha" ? 0 : 2,
  };
}
function exportKsEmitter(config, name) {
  const key = (name ?? "").startsWith("Effect/") ? name : undefined;
  const emitter = toKsEmitter(config, key);
  const json  = JSON.stringify(emitter, null, 2);
  const fname = (emitter.name).replace(/\//g, "_").replace(/\s+/g, "_") + ".emitter.json";
  const blob  = new Blob([json], { type: "application/json" });
  const a     = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob), download: fname,
  });
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus(`"${emitter.name}" を KS GPU Emitter JSON としてダウンロードしました (color-over-lifetime は start_color のみ)`);
}

// ── init ──────────────────────────────────────────────────────────────────────
connectParticle();
loadHealth();
loadCatalog();
</script>
</body>
</html>
