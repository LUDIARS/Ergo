# Ergo モジュール一覧 (機械処理用)
#
# 人間向けの一覧は module_list.md を参照。新規モジュール追加時は両方に
# エントリを足すこと。
#
# schema (modules[].*):
#   name:        CMake ターゲット名 (ergo_*)
#   summary:     1 行概要 (日本語)
#   category:    UI / ロジック / システム / ゲームオブジェクト
#   header_dir:  公開ヘッダのルート
#   source_dir:  実装ソースのルート
#   test_dir:    テストソースのルート
#   spec:        モジュール仕様書
#   cmake_option: ON/OFF で切り替える CMake オプション
#   tool_plugin: 付随する tools/ergo/ プラグイン id (無ければ null)
#   status:      stable / preview / incomplete のいずれか

schema_version: 1

modules:
  - name: ergo_input
    summary: マウス・キーボード・ゲームパッド・USB HID の統一入力レイヤ
    category: システム
    header_dir: include/ergo/input/
    source_dir: src/input/
    test_dir:   tests/input/
    spec:       spec/module/input.md
    cmake_option: ERGO_BUILD_INPUT
    tool_plugin: null
    status: preview

  - name: ergo_particle
    summary: CPU パーティクル sim + (任意) Pictor Vulkan ビルボード renderer
    category: システム
    header_dir: include/ergo/particle/
    source_dir: src/particle/
    test_dir:   tests/particle/
    spec:       spec/module/particle.md
    cmake_option: ERGO_BUILD_PARTICLE
    tool_plugin: particle
    status: stable

  - name: ergo_gpu_particle
    summary: Shuriken 相当の GPU compute パーティクル (IGpuBackend 抽象)
    category: システム
    header_dir: include/ergo/gpu_particle/
    source_dir: src/gpu_particle/
    test_dir:   tests/gpu_particle/
    spec:       spec/module/gpu_particle.md
    cmake_option: ERGO_BUILD_GPU_PARTICLE
    tool_plugin: null
    status: preview   # Burst cycles / shape variants が TODO

  - name: ergo_bind
    summary: 任意ホスト変数を WS アウトバウンドで外部エディタに公開
    category: システム
    header_dir: include/ergo/bind/
    source_dir: src/bind/
    test_dir:   tests/bind/
    spec:       spec/module/bind.md
    cmake_option: ERGO_BUILD_BIND
    tool_plugin: variable
    status: stable

  - name: ergo_actor
    summary: シーングラフ基底クラス。ツリーノード自動登録 + Actor 配下に変数を公開 (ergo_bind に委譲)
    category: システム
    header_dir: include/ergo/actor/
    source_dir: src/actor/
    test_dir:   tests/actor/
    spec:       spec/module/actor.md
    cmake_option: ERGO_BUILD_ACTOR   # ERGO_BUILD_BIND も ON が必須
    tool_plugin: variable
    status: preview

  - name: ergo_cast
    summary: Actor を名前付き Scene に束ねる軽量グルーピング層 (一括/個別 activate + snapshot)。非所有・描画非依存。ergo_scene (look-dev ドキュメント) とは別物
    category: システム
    header_dir: include/ergo/cast/
    source_dir: src/cast/
    test_dir:   tests/cast/
    spec:       spec/module/cast.md
    cmake_option: ERGO_BUILD_CAST   # ERGO_BUILD_ACTOR / ERGO_BUILD_BIND も ON が必須
    tool_plugin: null
    status: preview

  - name: ergo_sound
    summary: WAV デコード + ストリーム + ミキサ + 波形処理 + Quantizer (外部 lib 無し)
    category: システム
    header_dir: include/ergo/sound/
    source_dir: src/sound/
    test_dir:   tests/sound/
    spec:       spec/module/sound.md
    cmake_option: ERGO_BUILD_SOUND
    tool_plugin: null
    status: stable   # WAV only; 圧縮フォーマットは別 commit で stb_vorbis を vendor

  - name: ergo_frame
    summary: アプリ起動からの累計フレーム数 + rolling FPS + HUD 文字列
    category: システム
    header_dir: include/ergo/frame/
    source_dir: src/frame/
    test_dir:   tests/frame/
    spec:       spec/module/frame.md
    cmake_option: ERGO_BUILD_FRAME
    tool_plugin: null
    status: stable

  - name: ergo_profile
    summary: パフォーマンス確認用タイムライン (AOP 的マーカー注入 → Chrome Trace 出力)
    category: システム
    header_dir: include/ergo/profile/
    source_dir: src/profile/
    test_dir:   tests/profile/
    spec:       spec/module/profile.md
    cmake_option: ERGO_BUILD_PROFILE
    tool_plugin: profile
    status: preview   # tools/ergo profile プラグインは別途追加

  - name: ergo_log
    summary: 4-level ロガー (Error/Warn/Info/Debug)、先頭にフレーム番号
    category: システム
    header_dir: include/ergo/log/
    source_dir: src/log/
    test_dir:   tests/log/
    spec:       spec/module/log.md
    cmake_option: ERGO_BUILD_LOG
    tool_plugin: null
    status: stable

  - name: ergo_io
    summary: 最小ファイル I/O ラッパー (<filesystem> の薄膜、UTF-8 std::string API)
    category: システム
    header_dir: include/ergo/io/
    source_dir: src/io/
    test_dir:   tests/io/
    spec:       spec/module/io.md
    cmake_option: ERGO_BUILD_IO
    tool_plugin: null
    status: stable

  - name: ergo_audio
    summary: ゲーム SE/BGM の SDK ファサード (FMOD Core 既定 + Dummy 自動フォールバック)。ergo_sound とは独立・横並び
    category: システム
    header_dir: include/ergo/audio/
    source_dir: src/audio/
    test_dir:   tests/audio/
    spec:       spec/module/audio.md
    cmake_option: ERGO_BUILD_AUDIO   # backend は ERGO_AUDIO_BACKEND (auto/fmod/dummy)
    tool_plugin: null
    status: preview

  - name: ergo_world_time
    summary: グローバル time-scale コンポーザ (HitStop / HitSlow)。Foundation/WorldTimeScale の C++ ポート
    category: システム
    header_dir: include/ergo/world_time/
    source_dir: src/world_time/
    test_dir:   tests/world_time/
    spec:       spec/module/world_time.md
    cmake_option: ERGO_BUILD_WORLD_TIME
    tool_plugin: null
    status: preview

  - name: ergo_blackboard
    summary: グローバル名前付き Property レジストリ (subscribe + カテゴリ lifecycle)。Foundation/Blackboard の C++ ポート
    category: システム
    header_dir: include/ergo/blackboard/
    source_dir: src/blackboard/
    test_dir:   tests/blackboard/
    spec:       spec/module/blackboard.md
    cmake_option: ERGO_BUILD_BLACKBOARD
    tool_plugin: null
    status: preview

  - name: ergo_ui
    summary: SVG ラスタ + 9-slice フレームコンポーザ (RGBA8, Pictor/Vulkan 依存なし)
    category: UI
    header_dir: include/ergo/ui/
    source_dir: src/ui/
    test_dir:   tests/ui/
    spec:       spec/module/ui.md
    cmake_option: ERGO_BUILD_UI
    tool_plugin: null
    status: preview

  - name: ergo_custos
    summary: Custos 遠隔テストランナー (LUDIARS/Custos) と話す in-process HTTP ブリッジ
    category: システム
    header_dir: include/ergo/custos/
    source_dir: src/custos/
    test_dir:   tests/custos/
    spec:       spec/module/custos.md
    cmake_option: ERGO_BUILD_CUSTOS
    tool_plugin: null   # サービス側は LUDIARS/Custos リポ
    status: preview

  - name: ergo_health
    summary: HP コンテナ + ダメージ / 回復 / 死亡コールバック (game-lexicon: health-system)
    category: ロジック
    header_dir: include/ergo/health/
    source_dir: src/health/
    test_dir:   tests/health/
    spec:       spec/module/health.md
    cmake_option: ERGO_BUILD_HEALTH
    tool_plugin: null
    status: preview

  - name: ergo_score
    summary: スコアカウンタ + コンボ倍率 + ハイスコア通知 (game-lexicon: score-system)
    category: ロジック
    header_dir: include/ergo/score/
    source_dir: src/score/
    test_dir:   tests/score/
    spec:       spec/module/score.md
    cmake_option: ERGO_BUILD_SCORE
    tool_plugin: null
    status: preview

  - name: ergo_combo_counter
    summary: 連続成功カウンタ + フルコンボ通知 (game-lexicon: combo-counter)
    category: ロジック
    header_dir: include/ergo/combo_counter/
    source_dir: src/combo_counter/
    test_dir:   tests/combo_counter/
    spec:       spec/module/combo_counter.md
    cmake_option: ERGO_BUILD_COMBO_COUNTER
    tool_plugin: null
    status: preview

  - name: ergo_timing_judge
    summary: 音ゲー用ミリ秒タイミング判定 (PERFECT/GREAT/GOOD/MISS) (game-lexicon: timing-judge)
    category: ロジック
    header_dir: include/ergo/timing_judge/
    source_dir: src/timing_judge/
    test_dir:   tests/timing_judge/
    spec:       spec/module/timing_judge.md
    cmake_option: ERGO_BUILD_TIMING_JUDGE
    tool_plugin: null
    status: preview

  - name: ergo_render
    summary: Pictor 横断オーケストレーション層 (RenderContext / IRenderLayer / FrameComposer / ScreenshotBridge / カメラ math / StageRenderer)
    category: システム
    header_dir: include/ergo/render/
    source_dir: src/render/
    test_dir:   tests/render/
    spec:       spec/module/render.md
    cmake_option: ERGO_BUILD_RENDER   # Vulkan 実描画経路は pictor + Vulkan SDK 検出時のみ
    tool_plugin: null
    status: preview   # Vulkan 非依存部分のみテスト済。 KS/AC への載せ替えは P2

  - name: ergo_vector
    summary: SVG path polygon tessellation + extrude 3D mesh + vertex animation scene
    category: UI
    header_dir: include/ergo/vector/
    source_dir: src/vector/
    test_dir:   tests/vector/
    spec:       spec/module/vector.md
    cmake_option: ERGO_BUILD_VECTOR
    tool_plugin: null
    status: preview

  - name: ergo_ui_layout
    summary: Data-driven UI layout runtime with JSON model, binding, layout solve, and render adapter emit.
    category: UI
    header_dir: include/ergo/ui_layout/
    source_dir: src/ui_layout/
    test_dir:   tests/ui_layout/
    spec:       spec/module/ui_layout.md
    cmake_option: ERGO_BUILD_UI_LAYOUT
    tool_plugin: ui_layout
    status: preview

shared_libs:
  - name: ergo_common
    summary: モジュール横断の小物ユーティリティ (現状は minimal JSON codec のみ)
    header_dir: include/ergo/common/
    source_dir: src/common/
    spec: null


